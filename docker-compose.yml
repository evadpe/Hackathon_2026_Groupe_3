services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      # Les fichiers uploadés persistent entre les redémarrages
      - ./backend/uploads:/app/backend/uploads

  frontend:
    build:
      context: .
      dockerfile: frontend-platform/Dockerfile
      args:
        # URL de l'API vue depuis le navigateur (localhost car les ports sont exposés)
        NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
