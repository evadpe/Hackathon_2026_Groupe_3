services:
  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: namenode
    hostname: namenode
    environment:
      CLUSTER_NAME: hackathon-hdfs
      CORE_CONF_fs_defaultFS: hdfs://namenode:9000
      HDFS_CONF_dfs_webhdfs_enabled: "true"
      HDFS_CONF_dfs_permissions_enabled: "false"
    ports:
      - "9870:9870"
      - "9000:9000"
    volumes:
      - namenode_data:/hadoop/dfs/name

  datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: datanode
    hostname: datanode
    environment:
      CORE_CONF_fs_defaultFS: hdfs://namenode:9000
      HDFS_CONF_dfs_webhdfs_enabled: "true"
      HDFS_CONF_dfs_permissions_enabled: "false"
      SERVICE_PRECONDITION: namenode:9870
    ports:
      - "9864:9864"
    volumes:
      - datanode_data:/hadoop/dfs/data
    depends_on:
      - namenode

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      STORAGE_BACKEND: ${STORAGE_BACKEND:-hdfs}
      DATA_LAKE_BASE_DIR: /app/backend/data_lake
      HDFS_URL: ${HDFS_URL:-http://namenode:9870}
      HDFS_USER: ${HDFS_USER:-hdfs}
      HDFS_BASE_PATH: ${HDFS_BASE_PATH:-/stepahead-lake}
    volumes:
      # Le mode local persiste le data lake entre les redémarrages.
      - ./backend/data_lake:/app/backend/data_lake
      # Compatibilité avec les anciens fichiers déjà présents dans uploads/.
      - ./backend/uploads:/app/backend/uploads
    depends_on:
      - namenode
      - datanode

  frontend:
    build:
      context: .
      dockerfile: frontend-platform/Dockerfile
      args:
        # URL de l'API vue depuis le navigateur (localhost car les ports sont exposés)
        NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  namenode_data:
  datanode_data:
