services:
  airflow-postgres:
    image: postgres:16
    container_name: airflow-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow_postgres_data:/var/lib/postgresql/data

  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: namenode
    hostname: namenode
    environment:
      CLUSTER_NAME: hackathon-hdfs
      CORE_CONF_fs_defaultFS: hdfs://namenode:9000
      HDFS_CONF_dfs_webhdfs_enabled: "true"
      HDFS_CONF_dfs_permissions_enabled: "false"
    ports:
      - "9870:9870"
      - "9000:9000"
    volumes:
      - namenode_data:/hadoop/dfs/name

  datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: datanode
    hostname: datanode
    environment:
      CORE_CONF_fs_defaultFS: hdfs://namenode:9000
      HDFS_CONF_dfs_webhdfs_enabled: "true"
      HDFS_CONF_dfs_permissions_enabled: "false"
      SERVICE_PRECONDITION: namenode:9870
    ports:
      - "9864:9864"
    volumes:
      - datanode_data:/hadoop/dfs/data
    depends_on:
      - namenode

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      STORAGE_BACKEND: ${STORAGE_BACKEND:-hdfs}
      DATA_LAKE_BASE_DIR: /app/backend/data_lake
      HDFS_URL: ${HDFS_URL:-http://namenode:9870}
      HDFS_USER: ${HDFS_USER:-hdfs}
      HDFS_BASE_PATH: ${HDFS_BASE_PATH:-/stepahead-lake}
      PIPELINE_ORCHESTRATOR: ${PIPELINE_ORCHESTRATOR:-airflow}
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:-change-me}
    volumes:
      # Le mode local persiste le data lake entre les redémarrages.
      - ./backend/data_lake:/app/backend/data_lake
      # Compatibilité avec les anciens fichiers déjà présents dans uploads/.
      - ./backend/uploads:/app/backend/uploads
    depends_on:
      - namenode
      - datanode

  airflow-init:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    container_name: airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - >
        airflow db migrate &&
        (
        airflow users create
        --username ${AIRFLOW_USERNAME:-airflow}
        --password ${AIRFLOW_PASSWORD:-airflow}
        --firstname Airflow
        --lastname Admin
        --role Admin
        --email admin@example.com
        || true
        )
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
      BACKEND_INTERNAL_URL: http://backend:8000
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:-change-me}
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
    depends_on:
      - airflow-postgres

  airflow-webserver:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    container_name: airflow-webserver
    command: webserver
    ports:
      - "8080:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
      BACKEND_INTERNAL_URL: http://backend:8000
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:-change-me}
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
    depends_on:
      - airflow-postgres
      - airflow-init
      - backend

  airflow-scheduler:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    container_name: airflow-scheduler
    command: scheduler
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
      BACKEND_INTERNAL_URL: http://backend:8000
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:-change-me}
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
    depends_on:
      - airflow-postgres
      - airflow-init
      - backend

  frontend:
    build:
      context: .
      dockerfile: frontend-platform/Dockerfile
      args:
        # URL de l'API vue depuis le navigateur (localhost car les ports sont exposés)
        NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  airflow_postgres_data:
  airflow_logs:
  namenode_data:
  datanode_data:
